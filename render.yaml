services:
  - type: web
    name: mock-interview-app
    env: java
    buildCommand: "./mvnw clean package -DskipTests"
    startCommand: "java -jar target/Mock_Interview_Project-0.0.1-SNAPSHOT.jar"
    plan: free
    healthCheckPath: /health
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: mock-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: mock-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: mock-db
          property: password

databases:
  - name: mock-db
    databaseName: mockdb
    user: mockuser
    plan: free
