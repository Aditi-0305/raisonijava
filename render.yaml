services:
  - type: web
    name: mock-interview-app
    env: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: mock-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: mock-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: mock-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: mock-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: mock-db
          property: password

databases:
  - name: mock-db
    databaseName: mockdb
    user: mockuser
    plan: free
